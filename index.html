<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Pulse | Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="sky-container">
        <header class="main-header">
            <div class="logo-area">
                <h1 class="logo-text">Intelligence <span>Pulse</span></h1>
                <p class="live-status" id="liveClock">● LIVE UPDATES • SATURDAY, APRIL 25, 2026</p>
            </div>
<div class="header-actions">
    <button onclick="exportData('news')" class="export-btn">📥 Export News CSV</button>
    <button onclick="exportData('tools')" class="export-btn">📥 Export Tools CSV</button>
</div>
        </header>

        <nav class="tab-navigation" id="tabBar">
            <div class="tab-item active" id="tab-news" onclick="switchTab('news', this)">
                <span class="tab-label">NEWS STREAM</span>
                <div class="tab-controls">
                    <span class="edit-icon" onclick="renameTab(event, this)">✎</span>
                </div>
            </div>
            <div class="tab-item" id="tab-tools" onclick="switchTab('tools', this)">
                <span class="tab-label">AI TOOLKIT</span>
                <div class="tab-controls">
                    <span class="edit-icon" onclick="renameTab(event, this)">✎</span>
                </div>
            </div>
            <button id="addTabBtn" class="new-tab-trigger" onclick="addNewTab()">+ Add Stream</button>
        </nav>

        <main id="newsTab" class="tab-content active">
            <div class="feed-header">
                <h2 class="section-title">Latest AI & BFSI Pulses</h2>
                <span class="refresh-note">Auto-syncing via RSS...</span>
            </div>
            <div class="news-dense-grid" id="newsGrid">
                <div class="loading-state">Initialising live feed...</div>
            </div>
        </main>

        <main id="toolsTab" class="tab-content">
            <div class="feed-header">
                <h2 class="section-title">Global AI Tool Inventory</h2>
            </div>
            
            <div id="latestToolRow" class="hero-container">
                </div>

            <div id="toolsCategorized" class="directory-container">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
    
    <script>
        // Inline helper to keep the clock current
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('liveClock').innerText = `● LIVE UPDATES • ${now.toLocaleDateString('en-US', options).toUpperCase()}`;
        }
        setInterval(updateClock, 60000);
    </script>
</body>
</html>
