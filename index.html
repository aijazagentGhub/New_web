<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Dashboard - Summarized</title>
    <link rel="stylesheet" href="styles.css?v=1.1.0">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Dynamic Tab Manager</h1>
            <div class="header-right">
                <span id="syncStatus" style="font-size: 12px; margin-right: 15px; opacity: 0.8;"></span>
                <button id="addTabBtn" class="add-tab-btn">+ Add Tab</button>
            </div>
        </div>

        <div class="tabs-container">
            <div class="tab-buttons" id="tabButtons"></div>
        </div>

        <div class="tab-content" id="tabContent"></div>
    </div>

    <script src="script.js?v=1.1.0"></script>
</body>
</html>
