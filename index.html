<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Pulse | Hub</title>
    <style>
        :root { 
            --primary: #0077b6; 
            --bg: #f4f9fc; 
            --text-main: #1a2a3a;
            --text-sub: #5a6c7d;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text-main); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        header { margin-bottom: 40px; }
        header h1 { font-size: 32px; color: var(--primary); margin-bottom: 5px; }
        header p { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        .controls { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; }
        .btn-tab { padding: 10px 20px; background: var(--primary); color: white; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-outline { padding: 10px 20px; background: white; border: 1px solid #ddd; border-radius: 8px; color: #666; cursor: pointer; }
        .sync-text { font-size: 13px; color: #999; margin-left: auto; }

        /* News Grid */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        /* Professional Pulse Card */
        .pulse-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            display: flex; 
            flex-direction: column;
            transition: transform 0.2s ease;
            position: relative;
        }
        .pulse-card:hover { transform: translateY(-5px); }
        
        .badge { 
            background: #eef7ff; 
            color: var(--primary); 
            font-size: 10px; 
            font-weight: 800; 
            padding: 5px 10px; 
            border-radius: 6px; 
            width: fit-content;
            margin-bottom: 15px;
        }

        .pulse-card h3 { font-size: 20px; margin-bottom: 12px; line-height: 1.4; color: var(--text-main); }
        .pulse-card p { font-size: 15px; color: var(--text-sub); line-height: 1.6; margin-bottom: 25px; flex-grow: 1; }

        .card-footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 1px solid #f0f0f0; 
            padding-top: 15px;
            font-size: 13px;
            font-weight: bold;
        }
        .card-footer span { color: #ccc; }
        .card-footer a { color: var(--primary); text-decoration: none; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Intelligence Pulse</h1>
            <p>• Live Updates • Saturday, April 25, 2026</p>
        </header>

        <div class="controls">
            <button class="btn-tab">NEWS STREAM</button>
            <button class="btn-outline">AI TOOLKIT</button>
            <button class="btn-outline" style="border-style: dashed;">+ Add Stream</button>
            <span class="sync-text">Auto-syncing via Pipedream Agent...</span>
        </div>

        <div class="news-grid" id="news-stream-container">
            <p style="color: #999;">Connecting to secure pulse stream...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. YOUR FIREBASE CONFIG
        // PASTE YOUR KEYS FROM FIREBASE CONSOLE HERE
        const firebaseConfig = {
apiKey: "AIzaSyAnnzBIK2Y0P1Gn8_4I6ZOu2z0P1LEeDk0",
  authDomain: "aijazideas.firebaseapp.com",
  databaseURL: "https://aijazideas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aijazideas",
  storageBucket: "aijazideas.firebasestorage.app",
  messagingSenderId: "822948950064",
  appId: "1:822948950064:web:031df081b41175ef3a7df5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. The Pipedream Listener
        const pulseRef = db.ref('intelligence_pulse/news');

        pulseRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('news-stream-container');
            
            if (data) {
                container.innerHTML = ''; // Clear "Connecting..." or "undefined" messages
                
                // Get pulses and reverse them so the newest is first
                const keys = Object.keys(data).reverse();
                
                keys.forEach(key => {
                    const pulse = data[key];
                    
                    // Safely extract text even if the structure changes
                    const displayTitle = pulse.title || "Latest AI Update";
                    const displaySummary = typeof pulse === 'string' ? pulse : (pulse.summary || "Summary generated by Gemini.");

                    container.innerHTML += `
                        <div class="pulse-card">
                            <div class="badge">PULSE</div>
                            <h3>${displayTitle}</h3>
                            <p>${displaySummary}</p>
                            <div class="card-footer">
                                <span>Today</span>
                                <a href="#">READ ↗</a>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<p style="color: #999;">No pulses found. Run your Pipedream workflow to see data.</p>';
            }
        }, (error) => {
            console.error("Firebase Read Error:", error);
            document.getElementById('news-stream-container').innerHTML = '<p style="color: red;">Failed to connect to stream. Check Firebase Rules.</p>';
        });
    </script>
</body>
</html>
