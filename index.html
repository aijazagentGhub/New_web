<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tabbed Web Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dynamic Tab Manager</h1>
            <button id="addTabBtn" class="add-tab-btn">+ Add Tab</button>
        </div>

        <div class="tabs-container">
            <div class="tab-buttons" id="tabButtons">
                <!-- Tabs will be dynamically added here -->
            </div>
            <div class="tab-close-btn-container">
                <!-- Close buttons for tabs -->
            </div>
        </div>

        <div class="tab-content" id="tabContent">
            <!-- Tab content will be dynamically added here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
