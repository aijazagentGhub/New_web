<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Pulse | Sky Blue Edition</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sky-container">
        <header class="main-header">
            <div class="logo-area">
                <h1 class="logo-text">Intelligence <span>Pulse</span></h1>
                <p class="live-status">LATEST UPDATES • April 25, 2026</p>
            </div>
        </header>

        <nav class="tab-navigation" id="tabBar">
            <div class="tab-item active" onclick="switchTab('news', this)">
                <span class="tab-label">Tab 1: NEWS</span>
                <span class="rename-trigger" onclick="renameTab(event, this)">✎</span>
            </div>
            <div class="tab-item" onclick="switchTab('tools', this)">
                <span class="tab-label">Tab 2: AI TOOLS</span>
                <span class="rename-trigger" onclick="renameTab(event, this)">✎</span>
            </div>
            <button id="addTabBtn" class="new-tab-trigger" onclick="addNewTab()">+ New Tab</button>
        </nav>

        <main id="newsTab" class="tab-content active">
            <div class="tab-action-bar">
                <button onclick="exportData('news')" class="export-btn">📥 Export News CSV</button>
            </div>
            <div class="news-dense-grid" id="newsGrid"></div>
        </main>

        <main id="toolsTab" class="tab-content">
            <div class="tab-action-bar">
                <button onclick="exportData('tools')" class="export-btn">📥 Export Tools CSV</button>
            </div>
            <div id="latestToolRow"></div>
            <div id="toolsCategorized"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
