<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sky-container">
        <header class="main-header">
            <div class="logo-area">
                <h1>Intelligence <span>Pulse</span></h1>
                <p class="date-badge">Saturday, April 25, 2026</p>
            </div>
            <div id="actionWrapper" class="header-actions">
                <button id="exportBtn" class="glass-btn">📥 Export News</button>
            </div>
        </header>

        <nav class="tab-navigation" id="tabBar">
            <button class="tab-link active" onclick="switchTab('news')">Tab 1: NEWS</button>
            <button class="tab-link" onclick="switchTab('tools')">Tab 2: AI TOOLS</button>
            <button id="addTabBtn" class="add-tab-btn" onclick="addNewTab()">+ Add Tab</button>
        </nav>

        <main id="newsTab" class="tab-content active">
            <div class="news-grid" id="newsGrid"></div>
        </main>

        <main id="toolsTab" class="tab-content">
            <div class="tools-grid" id="toolsGrid"></div>
        </main>

        <main id="dynamicTab" class="tab-content">
            <div class="news-grid" id="dynamicGrid">
                <div class="empty-state">No content here yet. Use the "Add Tab" feature to create a new stream.</div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
